<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>福州到拉萨交互路线地图</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; color: #1f2933; }
    body { display: grid; grid-template-columns: 390px 1fr; background: #f6f1e7; }
    aside { height: 100vh; overflow: auto; border-right: 1px solid #d6c6a7; background: #fffaf0; padding: 18px 18px 28px; }
    h1 { font-size: 24px; line-height: 1.25; margin: 0 0 8px; }
    h2 { font-size: 16px; margin: 22px 0 10px; padding-bottom: 6px; border-bottom: 1px solid #e2d3b8; }
    p { font-size: 13px; line-height: 1.65; margin: 8px 0; color: #4b5563; }
    .map-wrap { position: relative; min-width: 0; }
    #map { width: 100%; height: 100vh; background: #dde8d8; }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin: 14px 0; }
    button, a.btn {
      appearance: none; border: 1px solid #c7b58f; border-radius: 6px; background: #ffffff;
      padding: 8px 10px; font-size: 13px; color: #24313f; cursor: pointer; text-decoration: none;
    }
    button:hover, a.btn:hover { background: #f2ead8; }
    .route {
      display: grid; grid-template-columns: 44px 1fr; gap: 10px; padding: 10px;
      border: 1px solid #e0d0ad; background: #fff; border-radius: 8px; margin: 8px 0;
    }
    .tag {
      display: inline-flex; align-items: center; justify-content: center; height: 30px; width: 40px;
      border-radius: 8px; color: #fff; font-weight: 700; font-size: 14px;
    }
    .route-title { font-weight: 700; font-size: 14px; margin-bottom: 3px; }
    .route-note { font-size: 12px; color: #5b6472; line-height: 1.45; }
    .route-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 7px; }
    .route-actions button, .route-actions a { font-size: 12px; padding: 5px 8px; }
    .poi-list { display: grid; gap: 6px; }
    .poi { display: flex; justify-content: space-between; gap: 10px; padding: 7px 8px; background: #fff; border: 1px solid #e5d6b8; border-radius: 6px; font-size: 12px; }
    .legend-line { width: 28px; height: 5px; display: inline-block; vertical-align: middle; border-radius: 6px; margin-right: 8px; }
    .leaflet-popup-content { font-family: "Microsoft YaHei", Arial, sans-serif; min-width: 220px; }
    .popup-title { font-weight: 700; font-size: 15px; margin-bottom: 6px; }
    .popup-note { font-size: 13px; line-height: 1.45; color: #4b5563; }
    .popup-link { display: inline-block; margin-top: 8px; color: #0b63ce; text-decoration: none; }
    .warning { background: #fff4d6; border: 1px solid #e5bf58; border-radius: 8px; padding: 10px; font-size: 12px; color: #5c4813; }
    @media (max-width: 860px) {
      body { grid-template-columns: 1fr; grid-template-rows: 45vh 55vh; }
      aside { order: 2; height: 55vh; border-right: 0; border-top: 1px solid #d6c6a7; }
      .map-wrap { order: 1; }
      #map { height: 45vh; }
    }
  </style>
</head>

    function amapNavUrl(route) {
      const a = pois[route.from], b = pois[route.to];
      const mode = route.mode.includes("步行") ? "walk" : "car";
      return `https://uri.amap.com/navigation?from=${a[1]},${a[0]},${encodeURIComponent(route.from)}&to=${b[1]},${b[0]},${encodeURIComponent(route.to)}&mode=${mode}&policy=1&coordinate=gaode&callnative=0`;

    function markerHtml(name) {

        dashArray: route.mode.includes("步行") ? "8 9" : null
      }).bindPopup(`

        <div class="popup-note">${route.mode}｜${route.note}</div>

    }
    function fitAll() { map.fitBounds(boundsFor(routes), { padding: [70, 70] }); }
    function fitCity() { map.fitBounds(boundsFor(routes.filter(r => r.type === "city")), { padding: [70, 70] }); }
    function fitRemote() { map.fitBounds(boundsFor(routes.filter(r => r.type === "remote")), { padding: [70, 70] }); }
    fitCity();
  </script>
</body>
